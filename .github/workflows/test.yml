name: PR Tests

on:
  pull_request:
    branches: [magpy-K-index]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test, alerts]"

      - name: Run tests
        run: pytest